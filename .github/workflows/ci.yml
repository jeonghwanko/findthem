name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CI: 타입체크 → 테스트 → 빌드 ──
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: shared 패키지 빌드
        run: npm run build -w packages/shared

      - name: web3-payment 패키지 빌드
        run: npm run build -w packages/web3-payment

      - name: Prisma 클라이언트 생성
        run: cd apps/api && npx prisma generate

      - name: 타입체크
        run: |
          cd apps/api && npx tsc --noEmit
          cd ../../apps/web && npx tsc --noEmit

      - name: 테스트
        run: npm test

      - name: 빌드
        run: npm run build
        env:
          VITE_KAKAO_JS_KEY: ${{ secrets.VITE_KAKAO_JS_KEY }}

  # ── CD: main 머지 시 서버 자동 배포 ──
  deploy:
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: 서버 코드 업데이트
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/findthem
            git pull origin master
            npm ci
            cd apps/api && npx prisma generate && cd ~/findthem
            npm run build
            cd apps/api && npx prisma migrate deploy && cd ~/findthem
            cp -r apps/web/dist/. /var/www/union/
            pm2 restart findthem-api || pm2 start ecosystem.config.cjs --env production
            pm2 save

            # Nginx 설정 업데이트 (Ghost /devlog 포함)
            sudo cp ~/findthem/deploy/nginx.conf /etc/nginx/sites-available/yoonion
            sudo nginx -t && sudo systemctl reload nginx
