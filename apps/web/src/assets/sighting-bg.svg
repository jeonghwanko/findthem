<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <!-- Warm background glow -->
  <circle cx="650" cy="150" r="200" fill="#FEF3C7" opacity="0.4"/>
  <circle cx="680" cy="140" r="140" fill="#FDE68A" opacity="0.2"/>

  <!-- Soft ground -->
  <ellipse cx="650" cy="250" rx="180" ry="18" fill="#D1FAE5" opacity="0.3"/>

  <!-- Person with phone/camera — right side -->
  <g transform="translate(580, 80)" opacity="0.25">
    <!-- Body -->
    <path d="M40 70 C40 55, 55 45, 55 45 L75 45 C75 45, 90 55, 90 70 L87 130 L43 130 Z" fill="#818CF8"/>
    <!-- Head -->
    <circle cx="65" cy="30" r="18" fill="#FDE68A"/>
    <!-- Hair -->
    <path d="M48 25 Q52 10, 65 13 Q78 10, 82 25 Q80 18, 65 16 Q50 18, 48 25Z" fill="#92400E"/>
    <!-- Eyes -->
    <circle cx="59" cy="28" r="1.8" fill="#1E1B4B"/>
    <circle cx="71" cy="28" r="1.8" fill="#1E1B4B"/>
    <!-- Smile -->
    <path d="M60 35 Q65 39, 70 35" stroke="#F59E0B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Arm holding phone -->
    <path d="M88 70 Q105 65, 108 80" stroke="#818CF8" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Phone -->
    <rect x="103" y="72" width="14" height="22" rx="3" fill="#1E1B4B" opacity="0.6"/>
    <rect x="105" y="75" width="10" height="15" rx="1" fill="#A5B4FC" opacity="0.5"/>
    <!-- Other arm -->
    <path d="M42 70 Q25 85, 30 105" stroke="#818CF8" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="50" y="128" width="10" height="35" rx="5" fill="#4338CA" opacity="0.6"/>
    <rect x="68" y="128" width="10" height="35" rx="5" fill="#4338CA" opacity="0.6"/>
  </g>

  <!-- Cat sitting — left of person -->
  <g transform="translate(530, 185)" opacity="0.2">
    <!-- Body -->
    <ellipse cx="25" cy="35" rx="18" ry="15" fill="#FB923C"/>
    <!-- Head -->
    <circle cx="12" cy="20" r="12" fill="#FBBF24"/>
    <!-- Ears -->
    <path d="M4 12 L1 2 L10 9Z" fill="#F59E0B"/>
    <path d="M18 10 L22 1 L14 8Z" fill="#F59E0B"/>
    <!-- Eyes -->
    <circle cx="8" cy="19" r="2" fill="#1E1B4B"/>
    <circle cx="16" cy="19" r="2" fill="#1E1B4B"/>
    <!-- Nose -->
    <path d="M12 23 L10 25 L14 25Z" fill="#92400E"/>
    <!-- Tail -->
    <path d="M42 30 Q55 15, 50 35" stroke="#D97706" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Paw prints trail -->
  <g opacity="0.08" fill="#92400E">
    <circle cx="420" cy="230" r="4"/><circle cx="417" cy="224" r="1.8"/><circle cx="423" cy="224" r="1.8"/><circle cx="415" cy="228" r="1.5"/><circle cx="425" cy="228" r="1.5"/>
    <circle cx="460" cy="220" r="3.5"/><circle cx="457" cy="215" r="1.6"/><circle cx="463" cy="215" r="1.6"/><circle cx="455" cy="219" r="1.3"/><circle cx="465" cy="219" r="1.3"/>
    <circle cx="495" cy="225" r="3.8"/><circle cx="492" cy="219" r="1.7"/><circle cx="498" cy="219" r="1.7"/><circle cx="490" cy="223" r="1.4"/><circle cx="500" cy="223" r="1.4"/>
  </g>

  <!-- Heart particles -->
  <g opacity="0.15">
    <path d="M560 100 C560 96, 564 94, 566 97 C568 94, 572 96, 572 100 C572 104, 566 108, 566 108 C566 108, 560 104, 560 100Z" fill="#F472B6"/>
    <path d="M620 70 C620 67, 623 66, 624 68 C625 66, 628 67, 628 70 C628 73, 624 75, 624 75 C624 75, 620 73, 620 70Z" fill="#FB923C"/>
    <path d="M700 95 C700 92, 703 91, 704 93 C705 91, 708 92, 708 95 C708 98, 704 100, 704 100 C704 100, 700 98, 700 95Z" fill="#A78BFA"/>
  </g>

  <!-- Camera lens sparkle -->
  <g transform="translate(710, 60)" opacity="0.12">
    <circle cx="15" cy="15" r="12" stroke="#6366F1" stroke-width="2" fill="none"/>
    <path d="M15 8 L15 5 M15 22 L15 25 M8 15 L5 15 M22 15 L25 15" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Sparkles -->
  <g opacity="0.12">
    <path d="M480 140 L482 136 L484 140 L482 144Z" fill="#FBBF24"/>
    <path d="M720 180 L722 176 L724 180 L722 184Z" fill="#818CF8"/>
    <path d="M550 240 L552 237 L554 240 L552 243Z" fill="#34D399"/>
  </g>

  <!-- Soft sun -->
  <circle cx="750" cy="40" r="25" fill="#FDE68A" opacity="0.15"/>
  <circle cx="750" cy="40" r="18" fill="#FBBF24" opacity="0.1"/>
</svg>
