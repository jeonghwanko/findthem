server {
    listen 3000;
    server_name union.pryzm.gg;

    root /var/www/union;
    index index.html;

    # 정적 에셋 캐싱
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|webp|ico|woff2|wasm|map)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 업로드 파일 서빙
    location /uploads/ {
        alias /home/ubuntu/findthem/apps/api/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API 프록시 → FindThem Express (포트 4000)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_pass         http://localhost:4000;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    add_header Vary "Accept-Encoding";
}
