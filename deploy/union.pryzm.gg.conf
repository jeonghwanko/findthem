# 크롤러 봇 UA 판별 (OG 메타 태그용)
map $http_user_agent $is_crawler {
    default                     0;
    "~*kakaotalk"               1;
    "~*facebookexternalhit"     1;
    "~*Facebot"                 1;
    "~*Twitterbot"              1;
    "~*LinkedInBot"             1;
    "~*Slackbot"                1;
    "~*Discordbot"              1;
    "~*TelegramBot"             1;
    "~*WhatsApp"                1;
}

server {
    listen 3000;
    server_name union.pryzm.gg;

    root /var/www/union;
    index index.html;

    # Apple App Site Association (Universal Links)
    location /.well-known/apple-app-site-association {
        default_type application/json;
    }

    # 신고 상세 페이지 — 크롤러는 Express OG 엔드포인트로 프록시
    location ~ ^/reports/([a-zA-Z0-9_-]+)$ {
        if ($is_crawler = 1) {
            rewrite ^/reports/(.+)$ /api/og/reports/$1 break;
            proxy_pass http://localhost:4000;
        }
        try_files /index.html =404;
    }

    # 업로드 파일 서빙 — ^~ 로 regex(.jpg 등)보다 우선 매칭
    location ^~ /uploads/ {
        alias /home/ubuntu/findthem/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # 정적 에셋 캐싱 (빌드 산출물 — /uploads/는 위에서 처리)
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|webp|ico|woff2|wasm|map)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 프록시 → FindThem Express (포트 4000)
    location /api/ {
        client_max_body_size 50m;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_pass         http://localhost:4000;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # Ghost CMS 데브로그 (포트 2368) — ^~ 으로 정적파일 regex보다 우선
    location ^~ /devlog {
        proxy_pass         http://localhost:2368;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    add_header Vary "Accept-Encoding";
}
